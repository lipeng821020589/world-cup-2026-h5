<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>揭幕战决策流程 · 2026 世界杯</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc;
    --fg: #172033;
    --muted: #5b6475;
    --line: #64748b;
    --neutral: #e2e8f0;
    --input: #bfdbfe;
    --process: #c7d2fe;
    --storage: #99f6e4;
    --external: #fde68a;
    --risk: #fecaca;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #a3adbd;
      --line: #94a3b8;
      --neutral: #334155;
      --input: #1d4ed8;
      --process: #4338ca;
      --storage: #0f766e;
      --external: #92400e;
      --risk: #991b1b;
    }
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  main { padding: 24px; max-width: 1100px; margin: 0 auto; }
  h1 { font-size: 22px; margin: 0 0 8px; }
  .sub { color: var(--muted); margin-bottom: 24px; }
  .legend { display: flex; gap: 12px; margin: 16px 0; font-size: 12px; flex-wrap: wrap; }
  .legend span { padding: 4px 10px; border-radius: 6px; border: 1px solid var(--line); }
  .legend .input { background: var(--input); }
  .legend .process { background: var(--process); }
  .legend .storage { background: var(--storage); }
  .legend .risk { background: var(--risk); }
  svg { width: 100%; height: auto; display: block; }
</style>
